<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiệm Nhỏ Xinh - Hệ Thống Đa Ngôn Ngữ</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Quicksand:wght@500;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        body { background-color: #fffaf5; color: #4a4a4a; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(255,182,193,0.2); border: 2px dashed #ffb6c1; }
        h1 { font-family: 'Comfortaa', cursive; color: #ff6b81; text-align: center; margin-bottom: 20px; }
        
        /* 3 Nút chuyển danh mục */
        .tab-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .tab-btn { background: #fff; border: 2px solid #ffb6c1; padding: 10px 24px; font-weight: 700; border-radius: 25px; cursor: pointer; transition: all 0.3s; color: #4a4a4a; }
        .tab-btn.active, .tab-btn:hover { background: #ff6b81; color: #fff; border-color: #ff6b81; transform: translateY(-2px); }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .product-card { border: 1px solid rgba(255,182,193,0.3); border-radius: 16px; overflow: hidden; text-align: center; background: #fff; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .img-box { height: 140px; background: #fff0f2; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .info { padding: 15px; }
        .price { color: #ff6b81; font-weight: 700; font-size: 1.2rem; margin-top: 5px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎀 Tiệm Nhỏ Xinh 20K 🎀</h1>
        
        <div class="tab-container">
            <button class="tab-btn active" onclick="switchTab('all')">🌈 Tất cả</button>
            <button class="tab-btn" onclick="switchTab('phukien')">🌸 Phụ kiện</button>
            <button class="tab-btn" onclick="switchTab('boardgame')">🃏 Boardgame</button>
        </div>

        <div class="products-grid">
            <div class="product-card" data-cate="phukien">
                <div class="img-box">🌸</div>
                <div class="info"><h3>Kẹp Tóc Thỏ Pink</h3><div class="price">20.000đ</div></div>
            </div>
            <div class="product-card" data-cate="boardgame">
                <div class="img-box">🃏</div>
                <div class="info"><h3>Bài Nói Hay Làm</h3><div class="price">20.000đ</div></div>
            </div>
            <div class="product-card" data-cate="phukien">
                <div class="img-box">🗝️</div>
                <div class="info"><h3>Móc Khóa Chữa Lành</h3><div class="price">20.000đ</div></div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(category) {
            // Đổi trạng thái sáng nút màu hồng cho nút được click
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Lọc sản phẩm tương ứng
            document.querySelectorAll('.product-card').forEach(card => {
                if (category === 'all' || card.getAttribute('data-cate') === category) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
